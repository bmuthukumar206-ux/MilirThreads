<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar | MilirThreads Admin</title>
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-page">

<aside class="admin-sidebar" id="adminSidebar">
  <a href="admin.html" class="admin-brand" aria-label="MilirThreads admin">
    <img src="logo.png" alt="">
  </a>
  <nav class="sidebar-nav">
    <span class="sidebar-section">General</span>
    <a href="admin.html" class="sidebar-link">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="admin-products.html" class="sidebar-link">
      <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Products</span>
    </a>
    <a href="admin-orders.html" class="sidebar-link">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      <span>Orders</span>
    </a>
    <a href="admin-calendar.html" class="sidebar-link active">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Calendar</span>
    </a>
    <span class="sidebar-section">Account</span>
    <button type="button" class="sidebar-link sidebar-link-logout" id="adminLogout">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Log out</span>
    </button>
  </nav>
</aside>

<header class="admin-topbar">
  <button class="admin-menu-btn" id="adminMenuBtn" type="button" aria-label="Open menu">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <div class="topbar-nav">
    <button class="topbar-nav-btn" type="button" onclick="history.back()" aria-label="Back">&lsaquo;</button>
    <button class="topbar-nav-btn" type="button" onclick="history.forward()" aria-label="Forward">&rsaquo;</button>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-user">
    <span class="topbar-user-avatar" id="topbarUserAvatar">A</span>
    <div class="topbar-user-meta">
      <strong id="topbarUserName">Admin</strong>
      <span id="topbarUserRole">Administrator</span>
    </div>
  </div>
</header>

<main class="admin-main">

  <div class="admin-head">
    <div class="admin-head-text">
      <span class="admin-eyebrow">Admin</span>
      <h1>Calendar</h1>
      <p class="admin-head-sub">Schedule orders, events and product launches</p>
    </div>
    <div class="admin-head-actions">
      <button class="btn btn-ghost" id="refreshBtn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        Refresh
      </button>
      <button class="btn btn-primary" id="newEntryBtn" type="button">+ New entry</button>
    </div>
  </div>

  <div class="cal-layout">
    <section class="admin-card cal-grid-card">
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="cal-arrow" id="calPrev" type="button" aria-label="Previous month">&lsaquo;</button>
          <strong id="calMonthLabel">—</strong>
          <button class="cal-arrow" id="calNext" type="button" aria-label="Next month">&rsaquo;</button>
        </div>
        <button class="cal-today-btn" id="calToday" type="button">Today</button>
        <div class="cal-legend">
          <span class="cal-legend-item cat-order"><i></i>Order</span>
          <span class="cal-legend-item cat-event"><i></i>Event</span>
          <span class="cal-legend-item cat-launch"><i></i>Launch</span>
        </div>
      </div>
      <div class="cal-weekdays">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span>
        <span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </section>

    <section class="admin-card cal-day-card">
      <header class="cal-day-head">
        <div>
          <span class="admin-eyebrow">Schedule</span>
          <h2 id="calDayTitle">Select a day</h2>
          <span class="cal-day-count" id="calDayCount"></span>
        </div>
        <button class="btn btn-ghost cal-day-add" id="calDayAdd" type="button">+ Add</button>
      </header>
      <div class="cal-timeline" id="calTimeline">
        <p class="cal-empty-day">Loading calendar…</p>
      </div>
    </section>
  </div>

</main>

<div class="modal-overlay" id="entryModal">
  <div class="modal cal-modal">
    <button class="modal-close" id="entryClose" type="button" aria-label="Close">&times;</button>
    <span class="modal-eyebrow">Schedule</span>
    <h3 id="entryModalTitle">New calendar entry</h3>
    <form id="entryForm" class="cal-form" novalidate>
      <div class="form-row">
        <div class="field">
          <label>Date</label>
          <input type="date" name="date" required />
        </div>
        <div class="field">
          <label>Time <span style="text-transform:none;letter-spacing:0">(optional)</span></label>
          <input type="time" name="time" />
        </div>
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" name="title" required placeholder="e.g. Diwali collection launch" />
      </div>
      <div class="field">
        <label>Category</label>
        <select name="category">
          <option value="order">Order</option>
          <option value="event">Event</option>
          <option value="launch">Launch</option>
        </select>
      </div>
      <div class="field">
        <label>Notes <span style="text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea name="notes" rows="3" placeholder="Any extra detail…"></textarea>
      </div>
      <button type="submit" class="btn btn-primary full" id="entrySubmit">Save entry</button>
      <p class="form-note" id="entryNote"></p>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  (function () {
    var btn = document.getElementById('adminMenuBtn');
    var sb = document.getElementById('adminSidebar');
    var page = document.querySelector('.admin-page');
    if (btn && sb && page) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        sb.classList.toggle('open');
        page.classList.toggle('sidebar-open');
      });
      document.addEventListener('click', function (e) {
        if (!page.classList.contains('sidebar-open')) return;
        if (sb.contains(e.target)) return;
        sb.classList.remove('open');
        page.classList.remove('sidebar-open');
      });
    }
    try {
      var raw = localStorage.getItem('milir_user');
      if (!raw) return;
      var u = JSON.parse(raw);
      var name = (u && u.name) || (u && u.email ? u.email.split('@')[0] : 'Admin');
      var role = u && u.role === 'admin' ? 'Administrator' : (u && u.role) || 'User';
      var initial = (name.trim()[0] || 'A').toUpperCase();
      var n = document.getElementById('topbarUserName');
      var r = document.getElementById('topbarUserRole');
      var a = document.getElementById('topbarUserAvatar');
      if (n) n.textContent = name;
      if (r) r.textContent = role;
      if (a) a.textContent = initial;
    } catch (e) { /* ignore */ }
  })();
</script>
<script type="module" src="js/pages/admin-calendar.js"></script>
</body>
</html>
