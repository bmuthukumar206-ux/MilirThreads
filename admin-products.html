<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add Products | MilirThreads Admin</title>
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-page">

<header class="admin-nav">
  <a href="admin.html" class="admin-brand" aria-label="MilirThreads admin">
    <img src="logo.png" alt="" class="brand-logo">
  </a>
  <nav class="admin-tabs">
    <a href="admin.html" class="admin-tab">Dashboard</a>
    <a href="admin-products.html" class="admin-tab active">Products</a>
    <a href="admin-orders.html" class="admin-tab">Orders</a>
    <a href="admin-calendar.html" class="admin-tab">Calendar</a>
  </nav>
  <div class="admin-nav-actions">
    <button class="btn btn-primary" id="adminLogout" type="button">Log out</button>
  </div>
</header>

<main class="admin-main container">
  <div class="admin-head">
    <div class="admin-head-text">
      <span class="admin-eyebrow">Admin</span>
      <h1>Products</h1>
      <p class="admin-head-sub">Add new products with multiple images, videos and MRP</p>
    </div>
  </div>

  <section class="admin-card product-form-card">
    <header>
      <h2>Product details</h2>
      <span class="admin-eyebrow">Saved to the <em>Products</em> sheet · image stored on Google Drive</span>
    </header>

    <form id="productForm" class="product-form" novalidate>
      <div class="product-form-grid">
        <!-- Media upload column — multiple images + videos -->
        <div class="image-uploader">
          <label class="image-drop" id="imageDrop">
            <input type="file" id="productMedia" name="media" accept="image/*,video/*" multiple hidden />
            <div class="image-empty" id="imageEmpty">
              <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="16" rx="2" />
                <circle cx="9" cy="10" r="2" />
                <path d="m3 17 5-5 4 4 3-3 6 6" />
              </svg>
              <strong>Click or drop images &amp; videos</strong>
              <span>Images JPG/PNG/WEBP up to 4 MB · Videos MP4/WEBM up to 25 MB · add as many as you like</span>
            </div>
          </label>
          <div class="media-previews" id="mediaPreviews" hidden></div>
          <button type="button" class="link-btn" id="clearMediaBtn" hidden>Remove all media</button>
          <p class="form-note" id="imageNote"></p>
        </div>

        <!-- Fields column -->
        <div class="product-fields">
          <div class="form-row">
            <div class="field">
              <label>Product name</label>
              <input type="text" name="name" required placeholder="e.g. Hand-Block Mulmul Kurta" />
            </div>
            <div class="field">
              <label>Product code</label>
              <input type="text" name="code" required placeholder="e.g. MT-K-001" />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label>Section</label>
              <select name="section" id="sectionSelect" required>
                <option value="">Select a section</option>
              </select>
            </div>
            <div class="field">
              <label>Sub category</label>
              <select name="sub_category" id="subCategorySelect" required disabled>
                <option value="">Pick a section first</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label>MRP (&#8377;)</label>
              <input type="number" name="mrp" min="0" step="1" placeholder="e.g. 3200" />
            </div>
            <div class="field">
              <label>Selling price (&#8377;)</label>
              <input type="number" name="price" required min="1" step="1" placeholder="e.g. 2499" />
            </div>
          </div>

          <div class="field">
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Materials, sizing, care instructions, story behind the piece…"></textarea>
          </div>

          <div class="product-form-actions">
            <button type="reset" class="btn btn-ghost" id="resetBtn">Clear form</button>
            <button type="submit" class="btn btn-primary" id="submitProduct">
              <span id="submitLabel">Save product</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </button>
          </div>
          <p class="form-note" id="productNote"></p>
        </div>
      </div>
    </form>
  </section>

  <section class="admin-card">
    <header>
      <h2>All products</h2>
      <span class="admin-eyebrow">Filter the catalog stored in the <em>Products</em> sheet</span>
    </header>
    <div class="product-filters">
      <div class="field">
        <label>Section</label>
        <select id="filterSection">
          <option value="">All sections</option>
        </select>
      </div>
      <div class="field">
        <label>Sub category</label>
        <select id="filterSubCategory" disabled>
          <option value="">All</option>
        </select>
      </div>
      <div class="field">
        <label>Added within</label>
        <select id="filterTime">
          <option value="all">Any time</option>
          <option value="1">Today</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 3 months</option>
        </select>
      </div>
      <button type="button" class="btn btn-ghost" id="filterReset">Clear</button>
      <button type="button" class="btn btn-primary" id="filterRefresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        Refresh
      </button>
    </div>
    <p class="filter-count" id="filterCount"></p>
    <div class="last-saved" id="productGrid">
      <div class="orders-empty">Loading products from the sheet…</div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script type="module" src="js/pages/admin-products.js"></script>
</body>
</html>
