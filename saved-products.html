<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saved Products | MilirThreads</title>
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="home-page saved-products-page">

<div class="announce">
  <div class="announce-track">
    <span>Free shipping across India on orders &#8377;999+</span>
    <span>&middot;</span>
    <span>Use code <b>MILIR10</b> for 10% off your first order</span>
    <span>&middot;</span>
    <span>Handmade in Chennai</span>
    <span>&middot;</span>
  </div>
</div>

<header class="nav-wrap" id="navWrap">
  <nav class="nav container">
    <a href="Index.html" class="brand">
      <img src="logo.png" alt="" class="brand-logo">
    </a>
    <ul class="nav-links">
      <li><a href="Index.html" class="nav-link">Home</a></li>
      <li><a href="shop.html" class="nav-link">Shop</a></li>
      <li><a href="enquiry.html" class="nav-link">Enquiry</a></li>
      <li><a href="contact.html" class="nav-link">About</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn" id="accountBtn" aria-label="Account">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
        <span class="account-dot" id="accountDot" hidden></span>
      </button>
      <button class="icon-btn cart-btn" id="cartBtn" aria-label="Cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h2l2.4 12.4a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2-1.6L21 9H6"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </nav>
</header>

<main>
  <section class="page-hero">
    <div class="container reveal in">
      <h1>Saved <em>products</em>.</h1>
      <p id="savedSub">Pieces you bookmarked for later.</p>
    </div>
  </section>

  <section class="new">
    <div class="container">
      <div class="products-wrap">
        <div class="products-track" id="savedProductsTrack"></div>
      </div>
    </div>
  </section>
</main>

<aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
  <div class="cart-drawer-inner">
    <header class="cart-head">
      <div>
        <span class="modal-eyebrow">Your bag</span>
        <h3 id="cartTitle">0 items</h3>
      </div>
      <button class="modal-close" id="cartClose" aria-label="Close cart">&times;</button>
    </header>
    <div class="cart-items" id="cartItems"></div>
    <footer class="cart-foot">
      <div class="cart-total">
        <span>Subtotal</span>
        <strong id="cartTotal">&#8377;0</strong>
      </div>
      <button class="btn btn-primary full" id="cartCheckout"><span>Checkout</span></button>
    </footer>
  </div>
</aside>

<aside class="account-drawer" id="accountPanel" aria-hidden="true">
  <div class="account-inner">
    <header class="cart-head">
      <div>
        <span class="modal-eyebrow">Your account</span>
        <h3 id="accountName">Welcome</h3>
        <p class="account-meta" id="accountMeta"></p>
      </div>
      <button class="modal-close" id="accountClose" aria-label="Close">&times;</button>
    </header>
    <div class="account-actions">
      <button class="account-action" id="viewOrdersBtn"><span>My orders</span></button>
      <button class="account-action" id="savedProductsBtn"><span>Saved products</span></button>
      <button class="account-action" id="trackOrderBtn"><span>Track order</span></button>
      <button class="account-action admin-only" id="adminPanelBtn" hidden><span>Admin dashboard</span></button>
      <button class="account-action danger" id="logoutBtn"><span>Log out</span></button>
    </div>
  </div>
</aside>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="buyModal"></div>

<script type="module" src="js/main.js"></script>
<script type="module" src="js/pages/saved-products.js"></script>
</body>
</html>
